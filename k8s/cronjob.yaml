apiVersion: batch/v1
kind: CronJob
metadata:
  name: raillo-batch
  namespace: raillo
spec:
  schedule: "0 17 * * *" # UTC 17:00 = KST 02:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: raillo-batch
              image: 052104148083.dkr.ecr.ap-northeast-2.amazonaws.com/raillo-batch:latest
              resources:
                limits:
                  cpu: "1"
                  memory: "1Gi"
                requests:
                  cpu: "0.5"
                  memory: "512Mi"
              env:
                - name: BATCH_MODE
                  value: "day"
                - name: DB_URL
                  valueFrom:
                    secretKeyRef:
                      name: raillo-secrets
                      key: DB_URL
                - name: DB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: raillo-secrets
                      key: DB_USERNAME
                - name: DB_PW
                  valueFrom:
                    secretKeyRef:
                      name: raillo-secrets
                      key: DB_PW
                - name: TRAIN_SCHEDULE_FILENAME
                  value: "train_schedule.xlsx"
                - name: STATION_FARE_FILENAME
                  value: "station_fare.xls"
                - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                  value: "none"
