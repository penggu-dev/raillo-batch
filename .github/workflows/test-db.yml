name: Build Test DB Image

on:
  schedule:
    - cron: '0 17 * * *' # UTC 17:00 = KST 02:00
  workflow_dispatch:
    inputs:
      mode:
        description: 'Batch mode (init: 최초 세팅, day: 일일 업데이트)'
        required: true
        default: 'day'
        type: choice
        options:
          - init
          - day

env:
  TEST_DB_IMAGE: ogu1208/raillo-test-db:latest

jobs:
  build-test-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build batch jar
        run: ./gradlew bootJar --no-daemon

      - name: Determine batch mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "batch_mode=day" >> $GITHUB_OUTPUT
          else
            echo "batch_mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start MySQL from existing image (day mode)
        if: steps.mode.outputs.batch_mode == 'day'
        run: |
          docker pull ${{ env.TEST_DB_IMAGE }} || exit 1
          docker run -d --name test-mysql \
            -e MYSQL_DATABASE=raillo \
            -e MYSQL_USER=sa \
            -e MYSQL_PASSWORD=secret \
            -e MYSQL_ROOT_PASSWORD=secret \
            -p 3306:3306 \
            ${{ env.TEST_DB_IMAGE }}

      - name: Start fresh MySQL (init mode)
        if: steps.mode.outputs.batch_mode == 'init'
        run: |
          docker run -d --name test-mysql \
            -e MYSQL_DATABASE=raillo \
            -e MYSQL_USER=sa \
            -e MYSQL_PASSWORD=secret \
            -e MYSQL_ROOT_PASSWORD=secret \
            -p 3306:3306 \
            mysql:8

      - name: Wait for MySQL ready
        run: |
          for i in $(seq 1 30); do
            if docker exec test-mysql mysqladmin ping -h localhost -u root -psecret --silent 2>/dev/null; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL failed to start"
          exit 1

      - name: Run batch
        run: |
          java -jar build/libs/*.jar \
            --spring.datasource.url=jdbc:mysql://localhost:3306/raillo?rewriteBatchedStatements=true \
            --spring.datasource.username=sa \
            --spring.datasource.password=secret \
            --spring.jpa.hibernate.ddl-auto=${{ steps.mode.outputs.batch_mode == 'init' && 'create' || 'none' }} \
            --spring.docker.compose.enabled=false \
            --BATCH_MODE=${{ steps.mode.outputs.batch_mode == 'init' && 'init' || 'day' }} \
            --TRAIN_SCHEDULE_FILENAME=train_schedule.xlsx \
            --STATION_FARE_FILENAME=station_fare.xls

      - name: Stop MySQL gracefully
        run: docker stop test-mysql

      - name: Commit and push test DB image
        run: |
          docker commit test-mysql ${{ env.TEST_DB_IMAGE }}
          docker push ${{ env.TEST_DB_IMAGE }}
