name: Run Test DB Batch

on:
  schedule:
    - cron: '0 17 * * *' # UTC 17:00 = KST 02:00
  workflow_dispatch:
    inputs:
      mode:
        description: 'Batch mode (init: 최초 세팅, day: 일일 업데이트)'
        required: true
        default: 'day'
        type: choice
        options:
          - init
          - day

jobs:
  run-test-db-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build batch jar
        run: ./gradlew bootJar --no-daemon

      - name: Determine batch mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "batch_mode=day" >> $GITHUB_OUTPUT
          else
            echo "batch_mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Run batch
        env:
          BATCH_MODE: ${{ steps.mode.outputs.batch_mode }}
          DB_URL: ${{ secrets.TEST_DB_URL }}
          DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          DB_PW: ${{ secrets.TEST_DB_PW }}
          TRAIN_SCHEDULE_FILENAME: train_schedule.xlsx
          STATION_FARE_FILENAME: station_fare.xls
          SPRING_JPA_HIBERNATE_DDL_AUTO: ${{ steps.mode.outputs.batch_mode == 'init' && 'create' || 'none' }}
          SPRING_DOCKER_COMPOSE_ENABLED: "false"
        run: |
          java -jar build/libs/*.jar
